name: Flutter Build (Android & iOS)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FLUTTER

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: FLUTTER/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: FLUTTER

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Patch Info.plist — thêm quyền thư viện ảnh
        run: |
          PLIST="ios/Runner/Info.plist"
          # Thêm NSPhotoLibraryUsageDescription nếu chưa có
          if ! grep -q "NSPhotoLibraryUsageDescription" "$PLIST"; then
            /usr/libexec/PlistBuddy -c \
              "Add :NSPhotoLibraryUsageDescription string 'Cần truy cập thư viện ảnh để đăng ký khuôn mặt'" \
              "$PLIST"
            echo "✅ Patched NSPhotoLibraryUsageDescription"
          fi
          # Thêm NSCameraUsageDescription nếu chưa có
          if ! grep -q "NSCameraUsageDescription" "$PLIST"; then
            /usr/libexec/PlistBuddy -c \
              "Add :NSCameraUsageDescription string 'Cần camera để chụp ảnh khuôn mặt'" \
              "$PLIST"
            echo "✅ Patched NSCameraUsageDescription"
          fi

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Zip Runner.app
        run: |
          cd build/ios/iphoneos
          zip -r Runner.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-no-codesign
          path: FLUTTER/build/ios/iphoneos/Runner.zip
